<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SKYWATCH — Global Webcam Explorer</title>
<meta name="description" content="Explorez des webcams en direct du monde entier avec météo en temps réel">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060a13;--surface:rgba(15,23,42,0.75);--surface-solid:#0f172a;
  --border:rgba(34,211,238,0.12);--border-hover:rgba(34,211,238,0.3);
  --cyan:#22d3ee;--cyan-glow:rgba(34,211,238,0.15);--cyan-dim:#0e7490;
  --orange:#f97316;--red:#ef4444;--green:#34d399;
  --text:#e2e8f0;--text-dim:#94a3b8;--text-muted:#475569;
  --radius:12px;--radius-sm:8px;--radius-lg:16px;
  --font-display:'Syne',sans-serif;--font-body:'Manrope',sans-serif;
  --shadow:0 8px 32px rgba(0,0,0,0.4);
  --transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--text-muted);border-radius:3px}

/* ── LOADER ── */
#loader{position:fixed;inset:0;z-index:10000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s,visibility .8s}
#loader.hidden{opacity:0;visibility:hidden;pointer-events:none}
.logo-anim{font-family:var(--font-display);font-size:clamp(28px,5vw,48px);font-weight:800;letter-spacing:6px;color:var(--cyan);text-shadow:0 0 40px var(--cyan-glow);animation:pulse 2s ease-in-out infinite}
.loader-sub{font-size:13px;color:var(--text-muted);margin-top:12px;letter-spacing:3px;text-transform:uppercase}
.bar-wrap{width:200px;height:2px;background:rgba(34,211,238,.1);border-radius:1px;margin-top:32px;overflow:hidden}
.bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--orange));border-radius:1px;animation:loadbar 2s ease-in-out forwards}
.loader-status{margin-top:16px;font-size:11px;color:var(--text-muted);letter-spacing:1px;min-height:16px;transition:opacity .3s}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
@keyframes loadbar{0%{width:0}100%{width:100%}}

/* ── APP ── */
#app{display:grid;grid-template-rows:auto 1fr;height:100vh;opacity:0;transition:opacity .6s}
#app.visible{opacity:1}

/* ── HEADER ── */
header{display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--surface);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:100;flex-wrap:wrap}
.logo{font-family:var(--font-display);font-weight:800;font-size:20px;letter-spacing:3px;color:var(--cyan);white-space:nowrap;cursor:pointer;display:flex;align-items:center;gap:8px}
.logo .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:blink 3s ease-in-out infinite}
@keyframes blink{0%,90%,100%{opacity:1}95%{opacity:.3}}
.api-badge{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-left:4px}
.api-badge.live{background:rgba(52,211,153,.15);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.api-badge.demo{background:rgba(249,115,22,.15);color:var(--orange);border:1px solid rgba(249,115,22,.3)}

.search-wrap{position:relative;flex:1;min-width:200px;max-width:480px}
.search-wrap input{width:100%;padding:10px 16px 10px 40px;background:rgba(15,23,42,.9);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:var(--transition)}
.search-wrap input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-glow)}
.search-wrap input::placeholder{color:var(--text-muted)}
.search-wrap .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);pointer-events:none}
.search-results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface-solid);border:1px solid var(--border);border-radius:var(--radius);max-height:300px;overflow-y:auto;z-index:200;display:none}
.search-results.active{display:block}
.sr-item{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .15s}
.sr-item:hover{background:var(--cyan-glow)}
.sr-name{font-weight:600;font-size:13px}.sr-loc{font-size:11px;color:var(--text-muted)}

.header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.fbtn,.abtn{padding:8px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--text-dim);font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;transition:var(--transition);white-space:nowrap;letter-spacing:.5px;text-transform:uppercase}
.fbtn:hover,.abtn:hover{border-color:var(--border-hover);color:var(--text);background:var(--cyan-glow)}
.fbtn.active{border-color:var(--cyan);color:var(--cyan);background:var(--cyan-glow)}
.abtn.fav{border-color:rgba(249,115,22,.3);color:var(--orange)}.abtn.fav:hover{background:rgba(249,115,22,.1)}
.abtn.rand{border-color:rgba(52,211,153,.3);color:var(--green)}.abtn.rand:hover{background:rgba(52,211,153,.1)}
.cam-count{font-size:11px;color:var(--text-muted);font-weight:500;letter-spacing:1px}

/* ── MAIN ── */
main{display:grid;grid-template-columns:1fr 420px;height:100%;overflow:hidden;position:relative}
@media(max-width:900px){main{grid-template-columns:1fr}
.sidebar{position:fixed;inset:0;z-index:150;transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1)}.sidebar.open{transform:translateX(0)}.mob-tog{display:flex!important}}

/* ── MAP ── */
#map{width:100%;height:100%;z-index:1}
.leaflet-container{background:var(--bg)!important}
.leaflet-control-zoom{border:none!important}
.leaflet-control-zoom a{background:var(--surface-solid)!important;color:var(--text)!important;border:1px solid var(--border)!important;width:32px!important;height:32px!important;line-height:32px!important;font-size:16px!important}
.leaflet-control-zoom a:hover{background:var(--cyan-glow)!important;border-color:var(--cyan)!important}
.marker-cluster{background:rgba(34,211,238,.15)!important;border:2px solid var(--cyan)!important}
.marker-cluster div{background:var(--cyan)!important;color:var(--bg)!important;font-family:var(--font-display)!important;font-weight:700!important;font-size:12px!important}
.cm{width:28px;height:28px;border-radius:50%;background:var(--cyan);border:3px solid var(--bg);box-shadow:0 0 12px var(--cyan-glow),0 2px 8px rgba(0,0,0,.5);cursor:pointer;transition:transform .2s;display:flex;align-items:center;justify-content:center}
.cm:hover{transform:scale(1.3)}.cm svg{width:14px;height:14px;fill:var(--bg)}.cm.off{background:var(--text-muted);box-shadow:0 2px 8px rgba(0,0,0,.5)}
.leaflet-popup-content-wrapper{background:var(--surface-solid)!important;color:var(--text)!important;border:1px solid var(--border)!important;border-radius:var(--radius)!important;box-shadow:var(--shadow)!important}
.leaflet-popup-tip{background:var(--surface-solid)!important;border-right:1px solid var(--border)!important;border-bottom:1px solid var(--border)!important}
.leaflet-popup-close-button{color:var(--text-muted)!important;font-size:18px!important}
.pop{padding:4px;min-width:200px}.pop .pop-t{width:100%;height:120px;border-radius:var(--radius-sm);object-fit:cover;background:var(--surface);margin-bottom:8px;display:flex;align-items:center;justify-content:center}
.pop h4{font-family:var(--font-display);font-size:14px;font-weight:700;margin-bottom:4px}.pop p{font-size:11px;color:var(--text-dim)}
.pop-btn{display:inline-block;margin-top:8px;padding:6px 12px;background:var(--cyan);color:var(--bg);border:none;border-radius:var(--radius-sm);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--font-body);letter-spacing:.5px}

/* ── SIDEBAR ── */
.sidebar{background:var(--surface);backdrop-filter:blur(20px);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.sb-head h3{font-family:var(--font-display);font-size:15px;font-weight:700;letter-spacing:1px}
.sb-tabs{display:flex;gap:4px}
.tbtn{padding:6px 12px;border:none;border-radius:var(--radius-sm);background:transparent;color:var(--text-muted);font-size:11px;font-weight:600;cursor:pointer;transition:var(--transition);font-family:var(--font-body);text-transform:uppercase;letter-spacing:.5px}
.tbtn.active{background:var(--cyan-glow);color:var(--cyan)}
.sb-body{flex:1;overflow-y:auto;padding:12px}
.card{background:rgba(15,23,42,.5);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:var(--transition);margin-bottom:10px}
.card:hover{border-color:var(--border-hover);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.card-t{position:relative;width:100%;height:140px;overflow:hidden;background:linear-gradient(135deg,#0f172a,#1e293b)}
.card-t .tg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:36px;font-weight:800;letter-spacing:4px}
.card-t img.thumb{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.9}
.card-t .pi{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;z-index:2}
.card:hover .pi{opacity:1}
.pc{width:48px;height:48px;border-radius:50%;background:rgba(34,211,238,.9);display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px var(--cyan-glow)}
.pc svg{width:20px;height:20px;fill:var(--bg);margin-left:2px}
.cs{position:absolute;top:8px;right:8px;padding:3px 8px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;z-index:2}
.cs.on{background:rgba(52,211,153,.2);color:var(--green);border:1px solid rgba(52,211,153,.3)}
.cs.off{background:rgba(239,68,68,.2);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.card-i{padding:12px}
.card-n{font-family:var(--font-display);font-weight:700;font-size:13px;margin-bottom:4px;display:flex;align-items:center;justify-content:space-between}
.card-l{font-size:11px;color:var(--text-dim);margin-bottom:6px}
.card-m{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ctag{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:var(--cyan-glow);color:var(--cyan);border:1px solid rgba(34,211,238,.15);text-transform:capitalize}
.cw{font-size:11px;color:var(--text-muted);display:flex;align-items:center;gap:4px}
.cw .wicon{width:24px;height:24px}
.cw .wtemp{font-weight:700;color:var(--cyan);font-size:13px}
.fav-s{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px;transition:var(--transition);padding:2px}
.fav-s.on{color:var(--orange)}.fav-s:hover{color:var(--orange);transform:scale(1.2)}

.mob-tog{display:none;position:fixed;bottom:20px;right:20px;z-index:200;width:50px;height:50px;border-radius:50%;background:var(--cyan);border:none;color:var(--bg);font-size:20px;cursor:pointer;box-shadow:0 4px 20px var(--cyan-glow);align-items:center;justify-content:center}

/* ── VIEWER ── */
.viewer{position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.92);backdrop-filter:blur(8px);display:none;flex-direction:column;opacity:0;transition:opacity .3s}
.viewer.active{display:flex;opacity:1}
.vh{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;flex-shrink:0;flex-wrap:wrap;gap:12px}
.vh h2{font-family:var(--font-display);font-size:18px;font-weight:700}.vh .vloc{font-size:12px;color:var(--text-dim);margin-top:2px}
.vh .va{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.vbtn{padding:8px 16px;border:1px solid var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--text);font-size:12px;cursor:pointer;transition:var(--transition);font-family:var(--font-body)}
.vbtn:hover{background:var(--cyan-glow);border-color:var(--cyan)}
.vbtn.cls{border-color:rgba(239,68,68,.3);color:var(--red)}.vbtn.cls:hover{background:rgba(239,68,68,.1)}
.vb{flex:1;display:flex;align-items:center;justify-content:center;padding:0 24px 24px;overflow:hidden;position:relative}
.vf{width:100%;max-width:1200px;aspect-ratio:16/9;border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border);background:#000;position:relative}
.vf iframe{width:100%;height:100%;border:none}
.vf .off-msg{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text-muted);gap:12px}
.vf .off-msg svg{width:48px;height:48px;opacity:.3}
.vw{position:absolute;bottom:16px;left:16px;padding:12px 18px;background:var(--surface);backdrop-filter:blur(16px);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;gap:14px;font-size:13px;z-index:5}
.vw .vw-temp{font-family:var(--font-display);font-size:28px;font-weight:700;color:var(--cyan)}
.vw .vw-icon{width:40px;height:40px}
.vw .vw-det{font-size:11px;color:var(--text-dim);line-height:1.5}
.vw .vw-det span{color:var(--text);font-weight:600}
.vw .vw-spin{width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.nav-a{width:40px;height:40px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);font-size:18px;position:absolute;top:50%;transform:translateY(-50%);z-index:10}
.nav-a:hover{background:var(--cyan-glow);border-color:var(--cyan)}.nav-a.prev{left:8px}.nav-a.next{right:8px}

/* ── FAV PANEL ── */
.fp{position:fixed;top:0;right:0;bottom:0;width:380px;max-width:90vw;z-index:500;background:var(--surface-solid);border-left:1px solid var(--border);transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.fp.open{transform:translateX(0)}
.fp-h{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.fp-h h3{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--orange)}
.fp-b{flex:1;overflow-y:auto;padding:12px}
.fp .empty{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:13px}
.fbd{position:fixed;inset:0;z-index:499;background:rgba(0,0,0,.5);display:none}.fbd.active{display:block}

.empty-g{text-align:center;padding:60px 20px;color:var(--text-muted)}.empty-g p{font-size:13px}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.card{animation:fadeUp .4s ease both}
.card:nth-child(2){animation-delay:.05s}.card:nth-child(3){animation-delay:.1s}.card:nth-child(4){animation-delay:.15s}

.krow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.krow span{font-size:13px;color:var(--text-dim)}
.krow kbd{padding:3px 10px;border-radius:6px;background:rgba(34,211,238,.08);border:1px solid rgba(34,211,238,.15);font-family:var(--font-display);font-size:12px;font-weight:600;color:var(--cyan)}
.hist-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s;margin-bottom:3px}
.hist-item:hover{background:var(--cyan-glow)}
.hist-item .hi-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.hist-item .hi-name{font-size:12px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-item .hi-time{font-size:10px;color:var(--text-muted)}
.hist-item .hi-rm{opacity:0;transition:opacity .15s;background:none;border:none;color:var(--red);cursor:pointer;font-size:11px;padding:4px}
.hist-item:hover .hi-rm{opacity:1}
@media(max-width:600px){
header{padding:10px 12px;gap:10px}.logo{font-size:16px;letter-spacing:2px}
.header-actions{width:100%;overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}
.fbtn,.abtn{font-size:11px;padding:6px 10px;flex-shrink:0}.sb-body{padding:8px}.card-t{height:120px}
.vh{padding:12px 16px}.vb{padding:0 8px 16px}
}
</style>
</head>
<body>

<div id="loader">
  <div class="logo-anim">SKYWATCH</div>
  <div class="loader-sub">Global Webcam Explorer</div>
  <div class="bar-wrap"><div class="bar-fill"></div></div>
  <div class="loader-status" id="loadStatus">Initialisation…</div>
</div>

<div id="app">
  <header>
    <div class="logo" onclick="SW.reset()">
      <span class="dot"></span>SKYWATCH
      <span class="api-badge" id="apiBadge">DEMO</span>
    </div>
    <div class="search-wrap">
      <span class="si"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg></span>
      <input type="text" id="searchInput" placeholder="Rechercher une ville, un pays, un continent…" autocomplete="off">
      <div class="search-results" id="searchResults"></div>
    </div>
    <div class="header-actions">
      <button class="fbtn active" data-f="all">Tous</button>
      <button class="fbtn" data-f="city">🏙 Ville</button>
      <button class="fbtn" data-f="nature">🌿 Nature</button>
      <button class="fbtn" data-f="mountain">⛰ Montagne</button>
      <button class="fbtn" data-f="beach">🏖 Plage</button>
      <button class="abtn rand" onclick="SW.random()">🎲 Aléatoire</button>
      <button class="abtn fav" onclick="SW.toggleFavPanel()">⭐ <span id="favCount">0</span></button>
      <button class="abtn" style="border-color:rgba(167,139,250,.3);color:#a78bfa" onclick="SW.toggleHistPanel()">🕐</button>
      <button class="abtn" onclick="SW.showKeys()" title="Raccourcis clavier">⌨</button>
      <span class="cam-count"><span id="camCount">0</span> cams</span>
    </div>
  </header>
  <main>
    <div id="map"></div>
    <div class="sidebar" id="sidebar">
      <div class="sb-head">
        <h3>📡 FLUX EN DIRECT</h3>
        <div class="sb-tabs">
          <button class="tbtn active" data-tab="grid">Grille</button>
          <button class="tbtn" data-tab="list">Liste</button>
        </div>
      </div>
      <div class="sb-body" id="camGrid"></div>
    </div>
    <button class="mob-tog" onclick="document.getElementById('sidebar').classList.toggle('open')">📡</button>
  </main>
</div>

<div class="viewer" id="viewer">
  <div class="vh">
    <div><h2 id="vTitle">—</h2><p class="vloc" id="vLoc">—</p></div>
    <div class="va">
      <button class="vbtn" id="vFav" onclick="SW.toggleFavViewer()">☆ Favori</button>
      <button class="vbtn" onclick="SW.fullscreen()">⛶ Plein écran</button>
      <button class="vbtn cls" onclick="SW.closeViewer()">✕ Fermer</button>
    </div>
  </div>
  <div class="vb">
    <button class="nav-a prev" onclick="SW.nav(-1)">‹</button>
    <div class="vf" id="vFrame"></div>
    <button class="nav-a next" onclick="SW.nav(1)">›</button>
  </div>
</div>

<div class="fbd" id="favBD" onclick="SW.toggleFavPanel()"></div>
<div class="fp" id="favP">
  <div class="fp-h"><h3>⭐ Mes Favoris</h3><button class="vbtn cls" onclick="SW.toggleFavPanel()">✕</button></div>
  <div class="fp-b" id="favList"></div>
</div>

<!-- HISTORY PANEL -->
<div class="fbd" id="histBD" onclick="SW.toggleHistPanel()"></div>
<div class="fp" id="histP" style="z-index:501">
  <div class="fp-h"><h3 style="color:#a78bfa">🕐 Historique</h3><button class="vbtn cls" onclick="SW.toggleHistPanel()">✕</button></div>
  <div class="fp-b" id="histList"></div>
</div>

<!-- KEYBOARD SHORTCUTS -->

const CC = {city:'#22d3ee',nature:'#34d399',mountain:'#a78bfa',beach:'#f97316'};
const OW_ICONS = i => `https://openweathermap.org/img/wn/${i}@2x.png`;

// ─── STATE ───────────────────────────────
let map, markers, allCams = [], filtered = [], curFilter = 'all';
let curIdx = -1, favs = [], apiMode = 'demo';
const weatherCache = new Map();

// ─── API CLIENT ──────────────────────────
const API = {
  base: '', // same origin

  async checkStatus() {
    try {
      const r = await fetch(`${this.base}/api/status`, {signal: AbortSignal.timeout(3000)});
      if (!r.ok) return null;
      return await r.json();
    } catch { return null; }
  },

  async getWeather(lat, lon) {
    const key = `${lat.toFixed(2)}:${lon.toFixed(2)}`;
    if (weatherCache.has(key)) {
      const c = weatherCache.get(key);
      if (Date.now() - c.ts < 600000) return c.data;
    }
    try {
      const r = await fetch(`${this.base}/api/weather?lat=${lat}&lon=${lon}`, {signal: AbortSignal.timeout(5000)});
      if (!r.ok) return null;
      const data = await r.json();
      if (data.fallback) return null;
      weatherCache.set(key, {data, ts: Date.now()});
      return data;
    } catch { return null; }
  },

  async searchWebcams(query) {
    try {
      const r = await fetch(`${this.base}/api/webcams?q=${encodeURIComponent(query)}&limit=30`, {signal: AbortSignal.timeout(8000)});
      if (!r.ok) return null;
      const data = await r.json();
      if (data.fallback) return null;
      return data.webcams || [];
    } catch { return null; }
  },

  async getNearbyWebcams(lat, lng, radius = 100) {
    try {
      const safeRadius = Math.min(radius, 250);
      const r = await fetch(`${this.base}/api/webcams?lat=${lat}&lng=${lng}&radius=${safeRadius}&limit=50`, {signal: AbortSignal.timeout(8000)});
      if (!r.ok) return null;
      const data = await r.json();
      if (data.fallback) return null;
      return data.webcams || [];
    } catch { return null; }
  }
};

// ─── INIT ────────────────────────────────
async function init() {
  const status = document.getElementById('loadStatus');

  status.textContent = 'Vérification des APIs…';
  const apiStatus = await API.checkStatus();

  if (apiStatus && (apiStatus.apis.windy === 'configured' || apiStatus.apis.openweather === 'configured')) {
    apiMode = 'live';
    status.textContent = 'APIs connectées ✓';
  } else {
    apiMode = 'demo';
    status.textContent = 'Mode démo';
  }

  // En mode live, pas de démos YouTube (streams morts) — on charge uniquement les cams Windy réelles
  allCams = apiMode === 'live' ? [] : [...DEMO_CAMS];

  // Si Windy est configuré, charger les 50 webcams les plus populaires au monde (1 seul appel)
  if (apiStatus && apiStatus.apis.windy === 'configured') {
    status.textContent = 'Chargement webcams mondiales…';
    try {
      const r = await fetch(`${API.base}/api/webcams?orderby=popularity&limit=50`, {signal: AbortSignal.timeout(10000)});
      if (r.ok) {
        const data = await r.json();
        if (data.webcams && data.webcams.length > 0) {
          allCams = data.webcams;
        }
      }
    } catch {}
  }

  loadFavs();
  loadHistory();

  setTimeout(() => {
    document.getElementById('loader').classList.add('hidden');
    document.getElementById('app').classList.add('visible');

    // API badge
    const badge = document.getElementById('apiBadge');
    if (apiMode === 'live') {
      badge.textContent = 'LIVE';
      badge.className = 'api-badge live';
    } else {
      badge.textContent = 'DEMO';
      badge.className = 'api-badge demo';
    }

    initMap();
    applyFilter('all');
    setupSearch();
    setupFilters();
    updateFavCount();

    // Précharger la météo pour les webcams visibles (en arrière-plan)
    if (apiMode === 'live') prefetchWeather();
  }, 2200);
}

// ─── WEATHER PREFETCH ────────────────────
async function prefetchWeather() {
  // Charger la météo par batch pour toutes les webcams
  const positions = allCams.map(c => ({id: c.id, lat: c.lat, lon: c.lng}));
  const batches = [];
  for (let i = 0; i < positions.length; i += 10) {
    batches.push(positions.slice(i, i + 10));
  }
  for (const batch of batches) {
    await Promise.allSettled(batch.map(async p => {
      const w = await API.getWeather(p.lat, p.lon);
      if (w) {
        const cam = allCams.find(c => c.id === p.id);
        if (cam) {
          cam._weather = w;
          cam._weatherTemp = `${w.temp}°C`;
          cam._weatherDesc = w.description;
          cam._weatherIcon = w.icon;
        }
      }
    }));
    // Rafraîchir la grille après chaque batch
    renderGrid(filtered);
    await new Promise(r => setTimeout(r, 200)); // rate limit friendly
  }
}

// ─── MAP ─────────────────────────────────
function initMap() {
  map = L.map('map', {center:[30,10],zoom:3,minZoom:2,maxZoom:18,zoomControl:true,attributionControl:false});
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19}).addTo(map);
  markers = L.markerClusterGroup({
    maxClusterRadius:50,spiderfyOnMaxZoom:true,showCoverageOnHover:false,
    iconCreateFunction:c=>L.divIcon({html:`<div>${c.getChildCount()}</div>`,className:'marker-cluster',iconSize:L.point(40,40)})
  });
  populateMarkers(allCams);
  map.addLayer(markers);
}

function populateMarkers(cams) {
  markers.clearLayers();
  cams.forEach(c => {
    const icon = L.divIcon({className:'',html:`<div class="cm ${c.status==='offline'?'off':''}"><svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg></div>`,iconSize:[28,28],iconAnchor:[14,14]});
    const wt = c._weatherTemp || '';
    const wd = c._weatherDesc || '';
    const m = L.marker([c.lat,c.lng],{icon});
    m.bindPopup(`<div class="pop"><div class="pop-t" style="background:linear-gradient(135deg,${CC[c.category]}22,#0f172a);font-family:var(--font-display);font-size:24px;font-weight:800;color:${CC[c.category]}44">${c.city.substring(0,3).toUpperCase()}</div><h4>${c.name}</h4><p>${c.city}, ${c.country}${wt?' · '+wt:''}${wd?' '+wd:''}</p><button class="pop-btn" onclick="SW.openViewer('${c.id}')">▶ Regarder</button></div>`,{maxWidth:260});
    markers.addLayer(m);
  });
}

// ─── SEARCH ──────────────────────────────
function setupSearch() {
  const inp = document.getElementById('searchInput');
  const res = document.getElementById('searchResults');
  let db;
  inp.addEventListener('input', () => {
    clearTimeout(db);
    db = setTimeout(() => {
      const q = inp.value.trim().toLowerCase();
      if (q.length < 2) {res.classList.remove('active');return;}
      const m = allCams.filter(c => c.name.toLowerCase().includes(q)||c.city.toLowerCase().includes(q)||c.country.toLowerCase().includes(q)||c.continent.toLowerCase().includes(q)).slice(0,8);
      if (!m.length) {res.classList.remove('active');return;}
      res.innerHTML = m.map(c => {
        const ico = c.category==='city'?'🏙':c.category==='nature'?'🌿':c.category==='mountain'?'⛰':'🏖';
        return `<div class="sr-item" onclick="SW.selectResult('${c.id}')"><span style="font-size:18px">${ico}</span><div><div class="sr-name">${hl(c.name,q)}</div><div class="sr-loc">${c.country} · ${c.continent}${c._weatherTemp?' · '+c._weatherTemp:''}</div></div></div>`;
      }).join('');
      res.classList.add('active');
    }, 120);
  });
  inp.addEventListener('blur', () => setTimeout(() => res.classList.remove('active'),200));
  inp.addEventListener('keydown', e => {if(e.key==='Escape'){inp.value='';res.classList.remove('active');}});
}

function hl(t,q) {
  const i = t.toLowerCase().indexOf(q);
  if (i===-1) return t;
  return t.substring(0,i)+`<span style="color:var(--cyan);font-weight:700">${t.substring(i,i+q.length)}</span>`+t.substring(i+q.length);
}

function selectResult(id) {
  const c = allCams.find(x=>x.id===id);if(!c)return;
  document.getElementById('searchInput').value=c.name;
  document.getElementById('searchResults').classList.remove('active');
  map.flyTo([c.lat,c.lng],12,{duration:1.5});
  setTimeout(()=>openViewer(id),800);
}

// ─── FILTERS ─────────────────────────────
function setupFilters() {
  document.querySelectorAll('.fbtn').forEach(b=>b.addEventListener('click',()=>applyFilter(b.dataset.f)));
}

function applyFilter(f) {
  curFilter = f;
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.toggle('active',b.dataset.f===f));
  filtered = f==='all' ? [...allCams] : allCams.filter(c=>c.category===f);
  document.getElementById('camCount').textContent = filtered.length;
  renderGrid(filtered);
  populateMarkers(filtered);
}

// ─── GRID ────────────────────────────────
function renderGrid(cams) {
  const g = document.getElementById('camGrid');
  if (!cams.length) {g.innerHTML='<div class="empty-g"><p>Aucune caméra trouvée</p></div>';return;}
  g.innerHTML = cams.map(c => {
    const wt = c._weatherTemp || '';
    const wd = c._weatherDesc || '';
    const wi = c._weatherIcon;
    const weatherHTML = wt
      ? `<span class="cw">${wi?`<img class="wicon" src="${OW_ICONS(wi)}" alt="">`:''}<span class="wtemp">${wt}</span> ${wd}</span>`
      : (apiMode==='live'?`<span class="cw"><span class="vw-spin" style="width:12px;height:12px;border-width:1px"></span></span>`:'');
    const thumbHTML = c.thumbnail
      ? `<img class="thumb" src="${c.thumbnail}" alt="${c.name}" loading="lazy" onerror="this.remove()">`
      : '';
    return `<div class="card" onclick="SW.openViewer('${c.id}')">
      <div class="card-t">
        <div class="tg" style="background:linear-gradient(135deg,${CC[c.category]}15,#0f172a);color:${CC[c.category]}22">${c.city.substring(0,3).toUpperCase()}</div>
        ${thumbHTML}
        <span class="cs ${c.status==='online'?'on':'off'}">${c.status==='online'?'● LIVE':'○ OFF'}</span>
        <div class="pi"><div class="pc"><svg viewBox="0 0 24 24"><polygon points="9,6 19,12 9,18"/></svg></div></div>
      </div>
      <div class="card-i">
        <div class="card-n"><span>${c.name}</span><button class="fav-s ${isFav(c.id)?'on':''}" onclick="event.stopPropagation();SW.toggleFav('${c.id}')">${isFav(c.id)?'★':'☆'}</button></div>
        <div class="card-l">${c.country} · ${c.continent}</div>
        <div class="card-m"><span class="ctag">${c.category}</span>${weatherHTML}</div>
      </div>
    </div>`;
  }).join('');
}

// ─── VIEWER ──────────────────────────────
async function openViewer(id) {
  const idx = filtered.findIndex(c=>c.id===id);
  if (idx===-1) return;
  curIdx = idx;
  const c = filtered[idx];
  const v = document.getElementById('viewer');
  document.getElementById('vTitle').textContent = c.name;
  document.getElementById('vFav').textContent = isFav(c.id)?'★ Favori':'☆ Favori';

  const frame = document.getElementById('vFrame');

  // Charger le flux
  if (c.status==='online' && c.embed) {
    frame.innerHTML = `<iframe src="${c.embed}" allow="autoplay; encrypted-media" allowfullscreen loading="lazy"></iframe>
      <div class="vw" id="vWeather"><div class="vw-spin"></div><span style="font-size:12px;color:var(--text-muted)">Chargement météo…</span></div>`;
  } else {
    frame.innerHTML = `<div class="off-msg"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9A2.25 2.25 0 0013.5 5.25h-9A2.25 2.25 0 002.25 7.5v9A2.25 2.25 0 004.5 18.75z"/></svg><p>Caméra hors ligne</p></div>`;
  }

  v.classList.add('active');
  document.body.style.overflow = 'hidden';
  addToHistory(cam);

  // Charger la météo en temps réel
  let weather = c._weather;
  if (!weather && apiMode === 'live') {
    weather = await API.getWeather(c.lat, c.lng);
    if (weather) {
      c._weather = weather;
      c._weatherTemp = `${weather.temp}°C`;
      c._weatherDesc = weather.description;
      c._weatherIcon = weather.icon;
    }
  }

  // Mettre à jour l'overlay météo
  const wEl = document.getElementById('vWeather');
  if (wEl && weather) {
    const dir = getWindDir(weather.wind_deg || 0);
    document.getElementById('vLoc').textContent = `${c.city}, ${c.country} · ${weather.temp}°C · ${weather.description}`;
    wEl.innerHTML = `
      <img class="vw-icon" src="${OW_ICONS(weather.icon)}" alt="${weather.description}">
      <span class="vw-temp">${weather.temp}°C</span>
      <div class="vw-det">
        <span>${weather.description}</span><br>
        Ressenti <span>${weather.feels_like}°C</span> · Vent <span>${weather.wind_speed} km/h ${dir}</span><br>
        Humidité <span>${weather.humidity}%</span> · Nuages <span>${weather.clouds}%</span>
        ${weather.visibility != null ? ` · Visibilité <span>${weather.visibility} km</span>` : ''}
      </div>`;
  } else if (wEl && !weather) {
    const wt = c._weatherTemp || '';
    const wd = c._weatherDesc || '';
    if (wt) {
      document.getElementById('vLoc').textContent = `${c.city}, ${c.country} · ${wt} · ${wd}`;
      wEl.innerHTML = `<span class="vw-temp">${wt}</span><span style="color:var(--text-dim)">${wd}</span>`;
    } else {
      document.getElementById('vLoc').textContent = `${c.city}, ${c.country}`;
      wEl.innerHTML = `<span style="color:var(--text-muted);font-size:12px">Météo indisponible</span>`;
    }
  }
}

function getWindDir(deg) {
  const dirs = ['N','NE','E','SE','S','SO','O','NO'];
  return dirs[Math.round(deg/45)%8];
}

function closeViewer() {
  document.getElementById('viewer').classList.remove('active');
  document.getElementById('vFrame').innerHTML = '';
  document.body.style.overflow = '';
}

function nav(dir) {
  if (!filtered.length) return;
  curIdx = (curIdx+dir+filtered.length)%filtered.length;
  openViewer(filtered[curIdx].id);
}

function fullscreen() {
  const f = document.getElementById('vFrame');
  if (!document.fullscreenElement) f.requestFullscreen?.() || f.webkitRequestFullscreen?.();
  else document.exitFullscreen?.() || document.webkitExitFullscreen?.();
}

function toggleFavViewer() {
  if (curIdx<0) return;
  toggleFav(filtered[curIdx].id);
  document.getElementById('vFav').textContent = isFav(filtered[curIdx].id)?'★ Favori':'☆ Favori';
}

document.addEventListener('keydown', e => {
  if (document.getElementById('keysOverlay').style.display === 'flex') { if (e.key==='Escape') hideKeys(); return; }
  const vOpen = document.getElementById('viewer').classList.contains('active');
  if (e.key==='?' && !vOpen) { showKeys(); return; }
  if ((e.key==='r'||e.key==='R') && !vOpen) { random(); return; }
  if (!vOpen) return;
  if (e.key==='Escape') closeViewer();
  if (e.key==='ArrowLeft') nav(-1);
  if (e.key==='ArrowRight') nav(1);
  if (e.key==='f'||e.key==='F') fullscreen();
  if (e.key==='s'||e.key==='S') toggleFavViewer();
});

// ─── FAVORITES ───────────────────────────
function loadFavs() {try{favs=JSON.parse(localStorage.getItem('sw_fav')||'[]');}catch{favs=[];}}
function saveFavs() {localStorage.setItem('sw_fav',JSON.stringify(favs));updateFavCount();}
function isFav(id) {return favs.includes(id);}
function toggleFav(id) {
  if (isFav(id)) favs=favs.filter(f=>f!==id); else favs.push(id);
  saveFavs(); renderGrid(filtered); renderFavPanel();
}
function updateFavCount() {document.getElementById('favCount').textContent=favs.length;}

function toggleFavPanel() {
  document.getElementById('favP').classList.toggle('open');
  document.getElementById('favBD').classList.toggle('active');
  renderFavPanel();
}

function renderFavPanel() {
  const el = document.getElementById('favList');
  const fc = allCams.filter(c=>favs.includes(c.id));
  if (!fc.length) {el.innerHTML='<div class="empty">Aucun favori. Cliquez ☆ pour en ajouter.</div>';return;}
  el.innerHTML = fc.map(c => {
    const wt = c._weatherTemp||'';
    return `<div class="card" onclick="SW.toggleFavPanel();SW.openViewer('${c.id}')">
      <div class="card-t" style="height:100px"><div class="tg" style="background:linear-gradient(135deg,${CC[c.category]}15,#0f172a);color:${CC[c.category]}22">${c.city.substring(0,3).toUpperCase()}</div>
      <span class="cs ${c.status==='online'?'on':'off'}">${c.status==='online'?'● LIVE':'○ OFF'}</span></div>
      <div class="card-i"><div class="card-n"><span>${c.name}</span><button class="fav-s on" onclick="event.stopPropagation();SW.toggleFav('${c.id}')">★</button></div>
      <div class="card-l">${c.country}${wt?' · '+wt:''}</div></div></div>`;
  }).join('');
}

// ─── RANDOM ──────────────────────────────
function random() {
  const pool = curFilter==='all' ? allCams : allCams.filter(c=>c.category===curFilter);
  const c = pool[Math.floor(Math.random()*pool.length)];
  map.flyTo([c.lat,c.lng],10,{duration:1.2});
  setTimeout(()=>openViewer(c.id),600);
}

// ─── TOAST ────────────────────────────────
let _tt;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1'; t.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(_tt); _tt = setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(-50%) translateY(60px)'; }, 2200);
}

// ─── HISTORY ─────────────────────────────
let history_ = [];
function loadHistory() { try { history_ = JSON.parse(localStorage.getItem('sw_hist') || '[]'); } catch { history_ = []; } }
function saveHistory() { localStorage.setItem('sw_hist', JSON.stringify(history_)); }
function addToHistory(cam) {
  history_ = history_.filter(h => h.id !== cam.id);
  history_.unshift({ id: cam.id, name: cam.name, city: cam.city, cat: cam.category || 'city', ts: Date.now() });
  if (history_.length > 50) history_ = history_.slice(0, 50);
  saveHistory();
}
function removeHistory(id) { history_ = history_.filter(h => h.id !== id); saveHistory(); renderHistPanel(); }
function timeAgo(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return "À l'instant"; if (s < 3600) return Math.floor(s/60) + 'min';
  if (s < 86400) return Math.floor(s/3600) + 'h'; return Math.floor(s/86400) + 'j';
}
function toggleHistPanel() {
  const p = document.getElementById('histP'); const b = document.getElementById('histBD');
  const open = p.classList.contains('open');
  p.classList.toggle('open'); b.classList.toggle('active');
  if (!open) renderHistPanel();
}
function renderHistPanel() {
  const el = document.getElementById('histList');
  if (!history_.length) { el.innerHTML = '<div class="empty-state" style="text-align:center;padding:40px 20px;color:var(--text-muted);font-size:12px">Aucun historique de visionnage.</div>'; return; }
  const catColors = {city:'#22d3ee',nature:'#34d399',mountain:'#a78bfa',beach:'#f97316'};
  const catIcons = {city:'🏙',nature:'🌿',mountain:'⛰',beach:'🏖'};
  el.innerHTML = history_.map(h => `
    <div class="hist-item" onclick="SW.toggleHistPanel();SW.openViewer('${h.id}')">
      <div class="hi-dot" style="background:${catColors[h.cat]||'#22d3ee'}22;color:${catColors[h.cat]||'#22d3ee'}">${catIcons[h.cat]||'📍'}</div>
      <div style="flex:1;min-width:0"><div class="hi-name">${h.name}</div><div class="hi-time">${timeAgo(h.ts)} · ${h.city}</div></div>
      <button class="hi-rm" onclick="event.stopPropagation();SW.removeHistory('${h.id}')">✕</button>
    </div>
  `).join('');
}

// ─── KEYBOARD SHORTCUTS ─────────────────
function showKeys() { document.getElementById('keysOverlay').style.display = 'flex'; }
function hideKeys() { document.getElementById('keysOverlay').style.display = 'none'; }

// ─── RESET ───────────────────────────────
function resetApp() {
  document.getElementById('searchInput').value = '';
  applyFilter('all');
  map.flyTo([30,10],3,{duration:1});
}

// ─── BOOT ────────────────────────────────
window.addEventListener('DOMContentLoaded', init);

// ─── PUBLIC API ──────────────────────────
return {
  openViewer, closeViewer, nav, fullscreen, toggleFavViewer,
  toggleFav, toggleFavPanel, toggleHistPanel, removeHistory,
  random, selectResult, reset: resetApp,
  showKeys, hideKeys
};

})(); // END SW module
</script>
</body>
</html>
